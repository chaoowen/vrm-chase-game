<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鯊魚人逃脫 - 手機優化版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        
        /* UI 資訊欄 */
        #ui { 
            position: absolute; top: 10px; left: 10px; color: #0f0; 
            background: rgba(0,0,0,0.7); padding: 8px; border: 1px solid #0f0;
            font-size: 12px; pointer-events: none; z-index: 10;
        }

        /* 遊戲結束畫面 */
        #msg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 100;
        }
        #msg h1 { color: #ff0000; margin-bottom: 20px; }
        .restart-btn { 
            padding: 15px 40px; font-size: 20px; cursor: pointer; 
            background: #0f0; color: #000; border: none; border-radius: 50px; font-weight: bold;
        }

        /* 手機虛擬按鈕樣式 */
        #controls {
            position: absolute; bottom: 30px; left: 30px;
            display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px);
            gap: 10px; z-index: 50;
        }
        .btn {
            width: 60px; height: 60px; background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; user-select: none;
            cursor: pointer;
            -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(0, 255, 0, 0.5); }
        .btn-up { grid-column: 2; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="ui">
        <b>[ 鯊魚生存模式 ]</b><br>
        殭屍：<span id="z-count">0</span>
    </div>

    <div id="controls">
        <div class="btn btn-up" id="ctrl-W">▲</div>
        <div class="btn btn-left" id="ctrl-A">◀</div>
        <div class="btn btn-down" id="ctrl-S">▼</div>
        <div class="btn btn-right" id="ctrl-D">▶</div>
    </div>

    <div id="msg" id="gameOverPanel">
        <h1>鯊魚被抓到了！</h1>
        <button class="restart-btn" onclick="location.reload()">重新開始</button>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
            }
        }
    </script>

    <script type="module" src="./game.js"></script>
</body>
</html>
