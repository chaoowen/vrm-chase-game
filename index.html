<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鯊魚人逃脫 - 手機優化版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        
        /* UI 資訊欄 */
        #ui { 
            position: absolute; top: 10px; left: 10px; color: #0f0; 
            background: rgba(0,0,0,0.7); padding: 8px; border: 1px solid #0f0;
            font-size: 12px; pointer-events: none; z-index: 10;
        }

        /* 遊戲結束畫面 */
        #msg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 100;
        }
        #msg h1 { color: #ff0000; margin-bottom: 20px; }
        .restart-btn { 
            padding: 15px 40px; font-size: 20px; cursor: pointer; 
            background: #0f0; color: #000; border: none; border-radius: 50px; font-weight: bold;
        }

        /* 手機虛擬按鈕樣式 */
        #controls {
            position: absolute; bottom: 30px; left: 30px;
            display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px);
            gap: 10px; z-index: 50;
        }
        .btn {
            width: 60px; height: 60px; background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; user-select: none;
            -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(0, 255, 0, 0.5); }
        .btn-up { grid-column: 2; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        /* 電腦版隱藏控制鈕（可選） */
        @media (min-width: 1024px) {
            #controls { display: none; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <b>[ 鯊魚生存模式 ]</b><br>
        殭屍：<span id="z-count">0</span>
    </div>

    <div id="controls">
        <div class="btn btn-up" id="ctrl-W">▲</div>
        <div class="btn btn-left" id="ctrl-A">◀</div>
        <div class="btn btn-down" id="ctrl-S">▼</div>
        <div class="btn btn-right" id="ctrl-D">▶</div>
    </div>

    <div id="msg" id="gameOverPanel">
        <h1>鯊魚被抓到了！</h1>
        <button class="restart-btn" onclick="location.reload()">重新開始</button>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        let scene, camera, renderer, clock, player;
        let zombies = [];
        let isGameOver = false;
        const keys = {};

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 5, 45);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 效能優化
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            scene.add(new THREE.GridHelper(100, 40, 0x00ff00, 0x111111));

            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));

            // 1. 載入鯊魚人
            loader.load('./public/assets/SharkPerson.vrm', (gltf) => {
                const vrm = gltf.userData.vrm;
                player = vrm.scene;
                scene.add(player);
                VRMUtils.rotateVRM0(vrm);
            }, undefined, (e) => {
                // 如果載入失敗，產生方塊主角確保遊戲可玩
                player = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshBasicMaterial({color: 0x00ffff}));
                scene.add(player);
            });

            // 2. 載入多個殭屍
            for (let i = 0; i < 10; i++) {
                loader.load('./public/assets/CoolAlien.vrm', (gltf) => {
                    const vrm = gltf.userData.vrm;
                    const z = vrm.scene;
                    const dist = 15 + Math.random() * 20;
                    const angle = Math.random() * Math.PI * 2;
                    z.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
                    VRMUtils.rotateVRM0(vrm);
                    z.userData = { vx: (Math.random()-0.5)*0.1, vz: (Math.random()-0.5)*0.1 };
                    scene.add(z);
                    zombies.push(z);
                    document.getElementById('z-count').innerText = zombies.length;
                });
            }

            // --- 控制邏輯：鍵盤 ---
            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            // --- 控制邏輯：手機觸控 ---
            ['W', 'A', 'S', 'D'].forEach(key => {
                const btn = document.getElementById(`ctrl-${key}`);
                const code = `Key${key}`;
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[code] = true; });
                btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[code] = false; });
            });
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (player) {
                const moveSpeed = 0.2;
                if (keys['KeyW']) player.position.z -= moveSpeed;
                if (keys['KeyS']) player.position.z += moveSpeed;
                if (keys['KeyA']) player.position.x -= moveSpeed;
                if (keys['KeyD']) player.position.x += moveSpeed;

                camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 8, player.position.z + 12), 0.1);
                camera.lookAt(player.position);
            }

            zombies.forEach((z) => {
                z.position.x += z.userData.vx;
                z.position.z += z.userData.vz;
                if (Math.abs(z.position.x) > 40) z.userData.vx *= -1;
                if (Math.abs(z.position.z) > 40) z.userData.vz *= -1;

                if (player) {
                    const dist = player.position.distanceTo(z.position);
                    if (dist < 1.4) {
                        isGameOver = true;
                        document.getElementById('msg').style.display = 'flex';
                    }
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
